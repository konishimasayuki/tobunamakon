<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7fd8e8"/>
      <stop offset="0.5" stop-color="#2f6fb0"/>
      <stop offset="1" stop-color="#1b3f74"/>
    </linearGradient>
    <linearGradient id="drum" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f6a23b"/>
      <stop offset="1" stop-color="#e07a1f"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- 東部 -->
  <text x="256" y="170" text-anchor="middle" font-family="'Hiragino Mincho ProN','Yu Mincho',serif" font-weight="700" font-size="120" fill="#d61f1f" letter-spacing="14">東部</text>
  <!-- ミキサー車 -->
  <g transform="translate(60,250)">
    <!-- ドラム -->
    <ellipse cx="250" cy="70" rx="120" ry="62" fill="url(#drum)"/>
    <path d="M150 70 q100 -40 200 0 q-100 40 -200 0Z" fill="#c9690f" opacity="0.5"/>
    <!-- 運転席 -->
    <path d="M40 30 h70 l28 40 v60 h-98 Z" fill="#f6a23b"/>
    <rect x="52" y="40" width="48" height="34" rx="6" fill="#cfe8f5"/>
    <!-- 車体下部 -->
    <rect x="20" y="120" width="360" height="26" rx="10" fill="#e07a1f"/>
    <!-- タイヤ -->
    <circle cx="110" cy="150" r="34" fill="#2a2a2a"/><circle cx="110" cy="150" r="15" fill="#9aa0a6"/>
    <circle cx="300" cy="150" r="34" fill="#2a2a2a"/><circle cx="300" cy="150" r="15" fill="#9aa0a6"/>
    <!-- ライト -->
    <circle cx="30" cy="96" r="7" fill="#ffd84d"/>
  </g>
  <!-- 下のライン -->
  <rect x="40" y="470" width="432" height="6" rx="3" fill="#d61f1f"/>
</svg>
